  <rect x="56" y="56" width="400" height="400" rx="120" fill="#F2D7EC"/>

  <rect x="120" y="140" width="272" height="190" rx="24"
        fill="none" stroke="#3D2A3A" stroke-width="14"/>

  <rect x="210" y="340" width="92" height="16" rx="8" fill="#3D2A3A"/>

  <rect x="170" y="190" width="190" height="120" rx="18" fill="#C7A2C5"/>
  <rect x="185" y="175" width="190" height="120" rx="18" fill="#E7E0EB"/>
  <rect x="200" y="160" width="190" height="120" rx="18" fill="#B48EAD"/>

</svg>
