<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo squircle Material You -->
  <defs>
    <filter id="shadow-bg-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18"
                    flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect x="56" y="56" width="400" height="400" rx="120"
        fill="#4D2E5F" filter="url(#shadow-bg-dark)"/>

  <!-- Tela SDDM (monitor) -->
  <rect x="120" y="140" width="272" height="190" rx="24"
        fill="none" stroke="#F2D7EC" stroke-width="14"/>

  <rect x="210" y="340" width="92" height="16" rx="8"
        fill="#F2D7EC"/>

  <!-- Sombras das camadas -->
  <defs>
    <filter id="shadow-layer-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10"
                    flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Camada inferior (rosa/lil·s) -->
  <rect x="170" y="190" width="190" height="120" rx="18"
        fill="#C7A2C5" filter="url(#shadow-layer-dark)"/>

  <!-- Camada do meio (cinza mÈdio) -->
  <rect x="185" y="175" width="190" height="120" rx="18"
        fill="#49454F" filter="url(#shadow-layer-dark)"/>

  <!-- Camada superior (roxo claro) -->
  <rect x="200" y="160" width="190" height="120" rx="18"
        fill="#E2BEE0" filter="url(#shadow-layer-dark)"/>

</svg>
