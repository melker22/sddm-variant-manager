<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo squircle Material You -->
  <defs>
    <filter id="shadow-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18"
                    flood-color="#C29BC0" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="56" y="56" width="400" height="400" rx="120"
        fill="#F2D7EC" filter="url(#shadow-bg)"/>

  <!-- Tela SDDM (monitor) -->
  <rect x="120" y="140" width="272" height="190" rx="24"
        fill="none" stroke="#3D2A3A" stroke-width="14"/>

  <rect x="210" y="340" width="92" height="16" rx="8"
        fill="#3D2A3A"/>

  <!-- Sombras das camadas -->
  <defs>
    <filter id="shadow-layer" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10"
                    flood-color="#3D2A3A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Camada inferior (lil�s) -->
  <rect x="170" y="190" width="190" height="120" rx="18"
        fill="#C7A2C5" filter="url(#shadow-layer)"/>

  <!-- Camada do meio (cinza claro) -->
  <rect x="185" y="175" width="190" height="120" rx="18"
        fill="#E7E0EB" filter="url(#shadow-layer)"/>

  <!-- Camada superior (roxo pastel) -->
  <rect x="200" y="160" width="190" height="120" rx="18"
        fill="#B48EAD" filter="url(#shadow-layer)"/>

</svg>
